app = "secret-santa"
primary_region = "ams"

[build]

[env]
  PORT = "8080"
  ENV = "production"
  LOG_LEVEL = "info"
  DATABASE_PATH = "/data/app.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

[[mounts]]
  source = "data"
  destination = "/data"
