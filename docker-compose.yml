services:
  app:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - db_data:/data
    environment:
      PORT: "8080"
      ENV: production
      DATABASE_PATH: /data/app.db
      BASE_URL: http://localhost:8080
      # RESEND_API_KEY: ""
      # EMAIL_FROM: ""
    restart: unless-stopped

volumes:
  db_data:
